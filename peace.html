<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,500&family=Cormorant+Upright:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body { background:#070503; display:flex; align-items:center; justify-content:center; }

.bg {
  position:fixed; inset:0; z-index:0;
  background-image:url('https://i.ibb.co/qFF6TM5Q/e5df4eb1c52940d37fe39245bdceebb9.jpg');
  background-size:cover; background-position:center 20%;
  filter:brightness(0.17) saturate(0.28) sepia(0.85) contrast(1.15);
  transform:scale(1.06);
  animation:breathe 26s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { transform:scale(1.06) translateY(0);    filter:brightness(0.17) saturate(0.28) sepia(0.85) contrast(1.15); }
  50%      { transform:scale(1.09) translateY(-5px); filter:brightness(0.21) saturate(0.22) sepia(0.9) contrast(1.1); }
}
.wash {
  position:fixed; inset:0; z-index:1;
  background:
    radial-gradient(ellipse 105% 50% at 50% 0%,   #040302 0%, transparent 80%),
    radial-gradient(ellipse 105% 54% at 50% 100%,  #020101 0%, transparent 72%),
    radial-gradient(ellipse 52% 105% at 0%   50%,  #040302 0%, transparent 66%),
    radial-gradient(ellipse 52% 105% at 100% 50%,  #040302 0%, transparent 66%);
}
.grain {
  position:fixed; inset:0; z-index:2; opacity:0.06; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:190px 190px;
}
.ember {
  position:fixed; border-radius:50%; pointer-events:none; z-index:3;
  background:rgba(188,152,88,0.13);
  animation:drift linear infinite;
}
@keyframes drift {
  0%   { opacity:0;    transform:translateY(108vh) translateX(0); }
  7%   { opacity:0.55; }
  93%  { opacity:0.28; }
  100% { opacity:0;    transform:translateY(-10vh) translateX(16px); }
}

/* STAGE */
.page {
  position:relative; z-index:20;
  width:min(540px, 88vw);
  display:flex; flex-direction:column; align-items:center;
  opacity:0;
  animation:wake 4.2s ease 0.3s forwards;
}
@keyframes wake {
  0%  { opacity:0; transform:translateY(12px); }
  38% { opacity:0; }
  100%{ opacity:1; transform:translateY(0); }
}

.sutra {
  font-family:'Noto Serif JP', serif; font-weight:200;
  font-size:clamp(8px,1.6vw,11px);
  color:rgba(180,148,78,0.22); letter-spacing:0.6em;
  margin-bottom:clamp(34px,8vw,64px);
  opacity:0; animation:show 2s ease 1.3s forwards;
}

.ghost {
  position:absolute;
  font-family:'Noto Serif JP', serif; font-weight:200;
  font-size:clamp(120px,30vw,200px);
  color:rgba(180,148,78,0.042);
  user-select:none; pointer-events:none;
  top:50%; left:50%; transform:translate(-50%,-46%); z-index:0;
  opacity:0; animation:show 3.5s ease 2s forwards;
}

.poem {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:flex-start;
  gap:clamp(16px,4vw,28px);
  width:100%;
  padding:0 clamp(6px,2.5vw,20px);
}

.line { opacity:0; animation:line-rise 2s cubic-bezier(0.22,1,0.36,1) forwards; }
.line:nth-child(1){ animation-delay:1.9s; }
.line:nth-child(2){ animation-delay:2.7s; }
.line:nth-child(3){ animation-delay:3.5s; }
.line:nth-child(4){ animation-delay:4.3s; }
@keyframes line-rise {
  from { opacity:0; transform:translateX(-7px) translateY(2px); }
  to   { opacity:1; transform:translateX(0) translateY(0); }
}

.l1 {
  font-family:'Cormorant Garamond', serif; font-weight:300;
  font-size:clamp(19px,4.8vw,28px);
  color:rgba(228,214,186,0.72); letter-spacing:0.03em; line-height:1.55;
}
.l2 {
  font-family:'Cormorant Garamond', serif; font-weight:300; font-style:italic;
  font-size:clamp(15px,3.8vw,21px);
  color:rgba(196,182,152,0.5); letter-spacing:0.05em; line-height:1.7;
  padding-left:clamp(12px,2.5vw,20px);
}
.l3 {
  font-family:'Cormorant Garamond', serif; font-weight:400;
  font-size:clamp(19px,4.8vw,28px);
  color:rgba(220,206,175,0.68); letter-spacing:0.035em; line-height:1.55;
}
.l4 {
  font-family:'Cormorant Upright', serif; font-weight:400;
  font-size:clamp(24px,6vw,38px);
  color:rgba(194,150,62,0.85); letter-spacing:0.06em; line-height:1.4;
  position:relative;
  padding-left:clamp(2px,0.8vw,8px);
  margin-top:clamp(4px,1vw,8px);
}
.l4::after {
  content:''; position:absolute; left:0; bottom:-10px;
  width:clamp(36px,7vw,58px); height:1px;
  background:rgba(194,150,62,0.28);
}

.spacer {
  margin-top:clamp(36px,8vw,58px);
  width:1px; height:clamp(24px,4.5vw,36px);
  background:linear-gradient(to bottom, rgba(180,148,78,0.22), transparent);
  opacity:0; animation:show 1.2s ease 5.1s forwards;
}

.kanji-row {
  margin-top:clamp(12px,2.5vw,20px);
  display:flex; gap:clamp(14px,3.5vw,28px);
  opacity:0; animation:show 1.8s ease 5.4s forwards;
}
.k { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:default; }
.kc {
  font-family:'Noto Serif JP', serif; font-weight:200;
  font-size:clamp(17px,4vw,26px);
  color:rgba(180,148,78,0.17);
  transition:color 1s ease, text-shadow 1s ease;
}
.k:hover .kc { color:rgba(194,150,62,0.45); text-shadow:0 0 22px rgba(194,150,62,0.12); }
.km {
  font-family:'Noto Serif JP', serif; font-weight:200;
  font-size:clamp(6.5px,1.3vw,8.5px);
  color:rgba(175,144,74,0.13); letter-spacing:0.22em; text-align:center;
}

.signoff {
  margin-top:clamp(24px,5vw,40px);
  font-family:'Noto Serif JP', serif; font-weight:200;
  font-size:clamp(7.5px,1.5vw,9.5px);
  color:rgba(175,144,74,0.13); letter-spacing:0.5em;
  opacity:0; animation:show 1.4s ease 6s forwards;
}

@keyframes show { from{opacity:0;} to{opacity:1;} }

.ripple {
  position:fixed; border-radius:50%; pointer-events:none; z-index:999;
  border:1px solid rgba(194,150,62,0.18);
  animation:rip 1.3s ease-out forwards;
}
@keyframes rip {
  from{ width:0; height:0; opacity:0.38; transform:translate(-50%,-50%); }
  to  { width:56px; height:56px; opacity:0; transform:translate(-50%,-50%); }
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wash"></div>
<div class="grain"></div>

<main class="page">
  <span class="sutra">般 若 心 經 &nbsp;·&nbsp; heart sutra</span>
  <div class="ghost" aria-hidden="true">水</div>
  <div class="poem">
    <p class="line l1">Once, we loved being good,</p>
    <p class="line l2">Only to realize in the end that it was selfish,</p>
    <p class="line l3">Understanding the meaning, I became real,</p>
    <p class="line l4">Not sugar, not salt — just water.</p>
  </div>
  <div class="spacer" aria-hidden="true"></div>
  <div class="kanji-row">
    <div class="k"><span class="kc">無</span><span class="km">emptiness</span></div>
    <div class="k"><span class="kc">我</span><span class="km">no-self</span></div>
    <div class="k"><span class="kc">水</span><span class="km">water</span></div>
    <div class="k"><span class="kc">道</span><span class="km">the way</span></div>
    <div class="k"><span class="kc">空</span><span class="km">void</span></div>
  </div>
  <span class="signoff">mu · ga · sui · dō · kū</span>
</main>

<script>
(function(){
  const n=window.innerWidth<600?8:15;
  for(let i=0;i<n;i++){
    const e=document.createElement('div'); e.className='ember';
    const s=Math.random()*2.4+0.7;
    e.style.cssText='width:'+s+'px;height:'+s+'px;left:'+(Math.random()*100)+'%;animation-duration:'+(14+Math.random()*22)+'s;animation-delay:'+(Math.random()*18)+'s;opacity:0;';
    document.body.appendChild(e);
  }
  let last=0;
  document.addEventListener('click',function(e){
    const now=Date.now(); if(now-last<360)return; last=now;
    const r=document.createElement('div'); r.className='ripple';
    r.style.left=e.clientX+'px'; r.style.top=e.clientY+'px';
    document.body.appendChild(r); setTimeout(function(){r.remove();},1400);
  });
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('selectstart',function(e){e.preventDefault();});
})();
</script>
</body>
</html>
