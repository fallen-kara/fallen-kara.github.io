/* â”€â”€ sparks particles â”€â”€ */
(function(){
  var cv=document.getElementById('sparks');
  if(!cv||!cv.getContext)return;
  if(navigator.hardwareConcurrency&&navigator.hardwareConcurrency<4&&window.innerWidth<680)return;
  var ctx=cv.getContext('2d'),W=0,H=0,P=[];
  function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  rsz();window.addEventListener('resize',rsz,{passive:true});
  function rnd(a,b){return a+(b-a)*Math.random();}
  function mk(){return{x:rnd(W*.05,W*.95),y:H+rnd(5,28),vx:rnd(-.22,.22),vy:rnd(-.35,-.90),l:1,d:rnd(.003,.007),r:rnd(.8,2.0),h:rnd(200,232),s:rnd(28,52),lm:rnd(36,54),wb:rnd(0,Math.PI*2),ws:rnd(.012,.035),wa:rnd(.12,.55)};}
  for(var i=0;i<28;i++){var p=mk();p.y=rnd(0,H);p.l=rnd(.1,1);P.push(p);}
  var paused=false,raf=0,last=0;
  document.addEventListener('visibilitychange',function(){
    if(document.hidden){paused=true;if(raf){cancelAnimationFrame(raf);raf=0;}}
    else{paused=false;last=0;raf=requestAnimationFrame(frame);}
  });
  function frame(ts){
    if(paused)return;
    raf=requestAnimationFrame(frame);
    if(lbOpen)return;
    if(ts-last>16){last=ts;ctx.clearRect(0,0,W,H);
      if(Math.random()<.18&&P.length<70)P.push(mk());
      for(var i=P.length-1;i>=0;i--){
        var p=P[i];p.wb+=p.ws;p.x+=p.vx+Math.sin(p.wb)*p.wa;p.y+=p.vy;p.l-=p.d;
        if(p.l<=0||p.y<-16){P[i]=P[P.length-1];P.pop();continue;}
        var a=p.l*.38;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.l,0,Math.PI*2);
        ctx.fillStyle='hsla('+p.h+','+p.s+'%,'+p.lm+'%,'+a+')';ctx.fill();
        var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.8*p.l);
        g.addColorStop(0,'hsla('+p.h+','+p.s+'%,'+(p.lm+10)+'%,'+(a*.30)+')');
        g.addColorStop(1,'hsla('+p.h+','+p.s+'%,'+p.lm+'%,0)');
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*2.8*p.l,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      }
    }
  }
  raf=requestAnimationFrame(frame);
})();

var rows=Math.ceil(images.length/cols);

function buildCosmos(){
  var frag=document.createDocumentFragment();
  var W=cosmos.offsetWidth||window.innerWidth;
  var H=cosmosH;

  images.forEach(function(item,i){
    var card=document.createElement('div');

    card.dataset.index=i;
    card.style.width=cardW+'px';

    var img=document.createElement('img');
    img.loading='lazy';img.decoding='async';
    img.alt=esc(item.name||'image');
    if('IntersectionObserver' in window){img.dataset.src=item.src;img.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22'+cardW+'%22 height=%22'+cardH+'%22%3E%3Crect fill=%22%23080b14%22 width=%22100%25%22 height=%22100%25%22/%3E%3C/svg%3E';}
    else{img.src=item.src;}
    img.draggable=false;

    var label=document.createElement('div');
    label.className='card-label';
    label.innerHTML='<div class="card-name" title="'+esc(item.name||'')+'">'+esc(item.name||'Untitled')+'</div>'
      +'<div class="card-tag">'+esc(item.tag||'')+'</div>';

    card.appendChild(img);
    card.appendChild(label);

    card.addEventListener('click',function(){openLB(i);});
    card.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();openLB(i);}});

    /* random starting position within the cosmos area */
    var x=rnd(PADDING,W-cardW-PADDING);
    var y=rnd(PADDING,H-cardH-PADDING);
    /* random slow velocity */
    var vx=rnd(-.09,.09);if(Math.abs(vx)<.025)vx=.03*(Math.random()>.5?1:-1);
    var vy=rnd(-.08,.08);if(Math.abs(vy)<.02)vy=.025*(Math.random()>.5?1:-1);
    /* gentle rotation */
    var rot=rnd(-2.5,2.5);
    var rotSpeed=rnd(-.006,.006);

    card.style.transform='translate3d('+x+'px,'+y+'px,0) rotate('+rot+'deg)';

    cards.push({el:card,x:x,y:y,vx:vx,vy:vy,rot:rot,rotSpeed:rotSpeed,hovered:false});

    /* fade in with stagger */
    setTimeout(function(){card.classList.add('visible');},250+i*100);

    /* pause drift on hover */
    card.addEventListener('mouseenter',function(){cards[i].hovered=true;preloadImg(images[i].src);});
    card.addEventListener('mouseleave',function(){cards[i].hovered=false;});

    frag.appendChild(card);
  });
  cosmos.appendChild(frag);
}
buildCosmos();

/* â”€â”€ intersection observer for card visibility â”€â”€ */
if('IntersectionObserver' in window){
  var visObs=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        var card=entry.target;
        var img=card.querySelector('img');
        if(img&&img.dataset.src){img.src=img.dataset.src;delete img.dataset.src;}
        visObs.unobserve(card);
      }
    });
  },{rootMargin:'200px'});
  cards.forEach(function(c){visObs.observe(c.el);});
}

/* â”€â”€ cosmos floating animation â”€â”€ */
(function(){
  var W=cosmos.offsetWidth||window.innerWidth;
  var H=cosmosH;
  var last=0;

  function updateBounds(){
    W=cosmos.offsetWidth||window.innerWidth;
    H=parseInt(cosmos.style.minHeight)||cosmosH;
  }
  window.addEventListener('resize',function(){
    updateBounds();
    isMobile=window.innerWidth<600;
  },{passive:true});

  var paused=false,raf=0;
  document.addEventListener('visibilitychange',function(){
    if(document.hidden){paused=true;if(raf){cancelAnimationFrame(raf);raf=0;}}
    else{paused=false;last=0;raf=requestAnimationFrame(animate);}
  });

  function animate(ts){
    if(paused)return;
    raf=requestAnimationFrame(animate);
    if(lbOpen)return;
    if(!last)last=ts;
    var dt=Math.min((ts-last)/16.67,3);
    last=ts;

    for(var i=0;i<cards.length;i++){
      var c=cards[i];
      if(c.hovered)continue;

      c.x+=c.vx*dt;
      c.y+=c.vy*dt;
      c.rot+=c.rotSpeed*dt;

      /* bounce off edges */
      if(c.x<0){c.x=0;c.vx=Math.abs(c.vx);}
      else if(c.x>W-cardW){c.x=W-cardW;c.vx=-Math.abs(c.vx);}
      if(c.y<0){c.y=0;c.vy=Math.abs(c.vy);}
      else if(c.y>H-cardH){c.y=H-cardH;c.vy=-Math.abs(c.vy);}

      c.el.style.transform='translate3d('+c.x.toFixed(1)+'px,'+c.y.toFixed(1)+'px,0) rotate('+c.rot.toFixed(2)+'deg)';
    }
  }
  raf=requestAnimationFrame(animate);
})();

/* â”€â”€ color-cycling borders â”€â”€ */
(function(){
  var palettes=[
    {h:270,s:55,l:52},
    {h:205,s:60,l:58},
    {h:42, s:70,l:54},
    {h:24, s:65,l:48},
    {h:100,s:50,l:55},
    {h:340,s:55,l:50},
    {h:180,s:50,l:48},
    {h:260,s:45,l:58},
    {h:55, s:55,l:52},
    {h:155,s:45,l:50},
  ];
  var currentColor={h:205,s:60,l:58};
  var targetColor={h:205,s:60,l:58};
  var progress=1;
  var prevIdx=-1;

  function lerp(a,b,t){return a+(b-a)*t;}

  function applyColor(c){
    var h=Math.round(c.h);
    cosmos.style.setProperty('--card-border','hsla('+h+','+c.s+'%,'+c.l+'%,.35)');
    cosmos.style.setProperty('--card-glow','0 0 18px hsla('+h+','+c.s+'%,'+c.l+'%,.25),inset 0 0 10px hsla('+h+','+c.s+'%,'+c.l+'%,.06)');
  }

  function pickNext(){
    var idx=Math.floor(Math.random()*palettes.length);
    if(palettes.length>1){while(idx===prevIdx)idx=Math.floor(Math.random()*palettes.length);}
    prevIdx=idx;
    currentColor={h:targetColor.h,s:targetColor.s,l:targetColor.l};
    targetColor=palettes[idx];
    progress=0;
  }

  function easeInOut(x){return x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}

  var transitionDuration=4500;
  var holdDuration=4000;
  var lastTime=0;
  var holding=false;
  var holdTimer=0;

  var cPaused=false,cRaf=0;
  document.addEventListener('visibilitychange',function(){
    if(document.hidden){cPaused=true;if(cRaf){cancelAnimationFrame(cRaf);cRaf=0;}}
    else{cPaused=false;lastTime=0;cRaf=requestAnimationFrame(animate);}
  });

  function animate(ts){
    if(cPaused)return;
    cRaf=requestAnimationFrame(animate);
    if(lbOpen){lastTime=0;return;}
    if(!lastTime)lastTime=ts;
    var dt=ts-lastTime;
    lastTime=ts;

    if(holding){
      holdTimer+=dt;
      if(holdTimer>=holdDuration){
        holding=false;
        holdTimer=0;
        pickNext();
      }
    }else{
      progress+=dt/transitionDuration;
      if(progress>=1){
        progress=1;
        holding=true;
        holdTimer=0;
      }
      var t=easeInOut(progress);
      var interp={
        h:lerp(currentColor.h,targetColor.h,t),
        s:lerp(currentColor.s,targetColor.s,t),
        l:lerp(currentColor.l,targetColor.l,t)
      };
      applyColor(interp);
    }
  }

  setTimeout(function(){
    pickNext();
    cRaf=requestAnimationFrame(animate);
  },800);
})();

/* â”€â”€ lightbox â”€â”€ */
var lightbox=document.getElementById('lightbox'),lbImg=document.getElementById('lbImg');
var lbTitle=document.getElementById('lbTitle'),lbTag=document.getElementById('lbTag'),lbCounter=document.getElementById('lbCounter');
var lbClose=document.getElementById('lbClose'),lbPrev=document.getElementById('lbPrev'),lbNext=document.getElementById('lbNext');
var lbIdx=0;

function openLB(idx){
  lbOpen=true;
  var seq=++_lbSeq;
  lbIdx=Math.max(0,Math.min(idx,images.length-1));
  var item=images[lbIdx];
  lbTitle.textContent=item.name||'Untitled';
  lbTag.textContent=item.tag||'';
  lbCounter.textContent=(lbIdx+1)+' / '+images.length;
  lbImg.classList.add('fading');
  lightbox.classList.add('open');
  document.body.style.overflow='hidden';
  var tmp=new Image();tmp.src=item.src;
  (tmp.decode?tmp.decode():Promise.resolve()).then(function(){
    if(seq!==_lbSeq)return;
    lbImg.src=item.src;lbImg.alt=esc(item.name||'');
    requestAnimationFrame(function(){lbImg.classList.remove('fading');});
  }).catch(function(){
    if(seq!==_lbSeq)return;
    lbImg.src=item.src;lbImg.alt=esc(item.name||'');
    lbImg.classList.remove('fading');
  });
  preloadImg(images[(lbIdx+1)%images.length].src);
  preloadImg(images[(lbIdx-1+images.length)%images.length].src);
}
function closeLB(){
  lbOpen=false;
  lightbox.classList.remove('open');
  document.body.style.overflow='';
  setTimeout(function(){lbImg.src='';},380);
}
function lbGo(dir){
  lbImg.classList.add('fading');
  setTimeout(function(){
    lbIdx=(lbIdx+dir+images.length)%images.length;
    openLB(lbIdx);
  },95);
}

lbClose.addEventListener('click',closeLB);
lbPrev.addEventListener('click',function(){lbGo(-1);});
lbNext.addEventListener('click',function(){lbGo(1);});
lbPrev.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();lbGo(-1);}});
lbNext.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();lbGo(1);}});
lightbox.addEventListener('click',function(e){if(e.target===lightbox)closeLB();});

var lbTx=0;
lightbox.addEventListener('touchstart',function(e){lbTx=e.changedTouches[0].clientX;},{passive:true});
lightbox.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-lbTx;if(Math.abs(dx)>42)lbGo(dx<0?1:-1);},{passive:true});

window.addEventListener('keydown',function(e){
  if(!lightbox.classList.contains('open'))return;
  if(e.key==='Escape')closeLB();
  if(e.key==='ArrowRight')lbGo(1);
  if(e.key==='ArrowLeft')lbGo(-1);
});

/* â”€â”€ lockdown â”€â”€ */
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();e.stopPropagation();return false;},true);
  ['copy','cut','paste','dragstart','selectstart','drag','drop'].forEach(function(ev){
    document.addEventListener(ev,function(e){e.preventDefault();e.stopPropagation();return false;},true);
  });
  document.addEventListener('keydown',function(e){
    var k=(e.key||'').toLowerCase(),c=e.ctrlKey||e.metaKey,s=e.shiftKey;
    if(k==='f12'||k==='f5'){e.preventDefault();e.stopPropagation();return false;}
    if(c&&'u s p c x a v g h d e f j i r w l'.split(' ').indexOf(k)>-1){e.preventDefault();e.stopPropagation();return false;}
    if(c&&s&&'i j c k m s e'.split(' ').indexOf(k)>-1){e.preventDefault();e.stopPropagation();return false;}
  },true);
  var _dt=false;
  function chkDT(){
    var w=window.outerWidth-window.innerWidth>160,h=window.outerHeight-window.innerHeight>160;
    if((w||h)&&!_dt){_dt=true;document.title='\u2629';document.body.innerHTML='<div style="background:#060810;color:#111;position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:14px;letter-spacing:.2em">\u2629</div>';}
  }
  setInterval(chkDT,800);window.addEventListener('resize',chkDT);
  window.addEventListener('beforeprint',function(e){e.preventDefault();});
  document.addEventListener('mousedown',function(e){if(e.target.tagName==='IMG')e.preventDefault();},true);
})();
</script>
